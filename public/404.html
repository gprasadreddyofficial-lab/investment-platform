<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WealthPro</title>
    <!--
      GitHub Pages SPA redirect trick.
      When a user hits a deep URL directly (e.g. /dashboard), GitHub Pages
      returns a 404. This page catches that, encodes the path into a query
      string and redirects to index.html, which then restores the URL via
      the script below (added to index.html).
    -->
    <script>
      var segmentCount = 1; // 1 = repo lives at /repo-name/
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
