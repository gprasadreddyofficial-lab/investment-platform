name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # triggers on every push to main
  workflow_dispatch: # allows manual trigger from GitHub Actions UI

# Sets permissions so the workflow can write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: investment-platform/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: investment-platform

      - name: Build project
        run: npm run build
        working-directory: investment-platform

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: investment-platform/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
